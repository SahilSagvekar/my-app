<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E8 App — Updating</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 36px;
      color: #fff;
    }

    .logo span { color: #f97316; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 28px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #fff;
    }

    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }

    .dot-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 32px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { background: #333; transform: scale(1); }
      40% { background: #f97316; transform: scale(1.3); }
    }
  </style>
  <!-- Auto-refresh every 15 seconds so users get back in automatically -->
  <meta http-equiv="refresh" content="15" />
</head>
<body>
  <div class="card">
    <div class="logo">E8<span>.</span></div>
    <div class="spinner"></div>
    <h1>App is being updated</h1>
    <p>We're deploying new changes. This usually takes a minute or two. The page will refresh automatically.</p>
    <div class="dot-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
