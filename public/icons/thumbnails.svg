<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--custom picture-frame emoji in the rodentia icon style, CC0-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 48 48">
 <defs>
  <linearGradient id="gold" x1="0" y1="9" x2="0" y2="39" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#ffe28c"/>
   <stop offset="0.5" stop-color="#eab73a"/>
   <stop offset="1" stop-color="#c8901c"/>
  </linearGradient>
  <linearGradient id="goldBevel" x1="0" y1="11" x2="0" y2="37" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#fff2bf"/>
   <stop offset="1" stop-color="#d6a229"/>
  </linearGradient>
  <linearGradient id="sky" x1="0" y1="14" x2="0" y2="34" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#d3ecf9"/>
   <stop offset="1" stop-color="#9fd2ef"/>
  </linearGradient>
  <radialGradient id="sun" cx="33.5" cy="18.5" r="2.6" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#fff7b0"/>
   <stop offset="1" stop-color="#ffd429"/>
  </radialGradient>
  <linearGradient id="mtn" x1="0" y1="18" x2="0" y2="34" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#a6bdd4"/>
   <stop offset="1" stop-color="#6e93b6"/>
  </linearGradient>
  <linearGradient id="hill" x1="0" y1="23" x2="0" y2="34" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#7cc44b"/>
   <stop offset="1" stop-color="#3d9130"/>
  </linearGradient>
  <linearGradient id="field" x1="0" y1="28" x2="0" y2="34" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#c6df62"/>
   <stop offset="1" stop-color="#97bf38"/>
  </linearGradient>
  <linearGradient id="sheen" x1="0" y1="9" x2="0" y2="26" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#fff" stop-opacity="0.85"/>
   <stop offset="1" stop-color="#fff" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="shadow" cx="24" cy="43" r="18" gradientUnits="userSpaceOnUse" gradientTransform="matrix(1,0,0,0.14,0,36.98)">
   <stop offset="0" stop-color="#2e3436"/>
   <stop offset="1" stop-color="#2e3436" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="pic"><rect x="9" y="14" width="30" height="20" rx="0.5"/></clipPath>
 </defs>

 <!-- drop shadow -->
 <ellipse cx="24" cy="43" rx="18" ry="2.5" fill="url(#shadow)" opacity="0.5"/>

 <!-- dark outline base -->
 <rect x="3.3" y="8.3" width="41.4" height="31.4" rx="2.2" fill="#4d3406"/>
 <!-- gold frame -->
 <rect x="4" y="9" width="40" height="30" rx="1.6" fill="url(#gold)"/>
 <!-- inner gold bevel molding -->
 <rect x="6.3" y="11.3" width="35.4" height="25.4" rx="1" fill="url(#goldBevel)"/>
 <!-- dark recessed groove around the picture -->
 <rect x="8" y="13" width="32" height="22" rx="0.8" fill="#6e4a0e"/>

 <!-- the painting -->
 <g clip-path="url(#pic)">
  <rect x="9" y="14" width="30" height="20" fill="url(#sky)"/>
  <circle cx="33.5" cy="18.5" r="2.4" fill="url(#sun)"/>
  <path d="M9,34 L19,18.5 L29.5,34 Z" fill="url(#mtn)"/>
  <path d="M21,34 C23.5,24.5 31,22.5 39,27.5 L39,34 Z" fill="url(#hill)"/>
  <path d="M9,34 L9,30.5 C13,27.8 18.5,28.8 23,34 Z" fill="url(#field)"/>
 </g>

 <!-- glossy sheen highlight on the frame -->
 <rect x="4.7" y="9.7" width="38.6" height="28.6" rx="1.2" fill="none" stroke="url(#sheen)" stroke-width="1" opacity="0.9"/>
</svg>